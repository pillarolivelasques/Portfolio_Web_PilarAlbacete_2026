<!DOCTYPE html>

  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@200&display=swap" rel="stylesheet">

  <style>
    .gallery-section {
      padding: 60px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .gallery-title {
      text-align: center;
      margin-bottom: 40px;
    }

    .gallery-grid {
      column-count: 3;
      column-gap: 16px;
    }

    .gallery-grid img {
      width: 100%;
      height: auto;
      display: block;
      margin-bottom: 16px;
      break-inside: avoid;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .gallery-grid img:hover {
      opacity: 0.85;
    }

    @media (max-width: 900px) {
      .gallery-grid {
        column-count: 2;
      }
    }

    @media (max-width: 560px) {
      .gallery-grid {
        column-count: 1;
      }
    }

    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 85%;
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 24px;
      right: 32px;
      color: white;
      font-size: 36px;
      cursor: pointer;
      line-height: 1;
    }
  </style>
</head>

  <script src="js/main.js"></script>
  <script>
    const galleryImages = document.querySelectorAll('.gallery-grid img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxClose = document.getElementById('lightbox-close');

    galleryImages.forEach(img => {
      img.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightbox.classList.add('active');
      });
    });

    function closeLightbox() {
      lightbox.classList.remove('active');
      lightboxImg.src = '';
    }

    lightboxClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });
  </script>
